<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="dns-prefetch" href="//cdn.flowpoint.ai" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700&display=optional"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700&display=optional"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700&display=optional"
      />
    </noscript>
    <meta
      name="description"
      content="Freelance web developer for Shopify, WordPress, and Webflow projects, with case studies, service details, and practical implementation guides."
    />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <title>Hasnain Saeed | Freelance Web Developer for Shopify, WordPress, and Webflow</title>
    <script>
      ;(() => {
        let hasLoadedFlowpoint = false

        const canDelayTracking = !navigator.connection?.saveData

        const loadFlowpoint = () => {
          if (hasLoadedFlowpoint || !canDelayTracking) return

          hasLoadedFlowpoint = true

          const script = document.createElement('script')
          script.src = 'https://cdn.flowpoint.ai/t/6cd64286-d52b-4e94-8584-5f13ab0409d2.js'
          script.async = true
          document.head.appendChild(script)
        }

        const scheduleFlowpoint = () => {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadFlowpoint, { timeout: 8000 })
            return
          }

          window.setTimeout(loadFlowpoint, 8000)
        }

        if (document.readyState === 'complete') {
          scheduleFlowpoint()
        } else {
          window.addEventListener('load', scheduleFlowpoint, { once: true })
        }

        window.addEventListener('pointerdown', loadFlowpoint, { once: true, passive: true })
        window.addEventListener('keydown', loadFlowpoint, { once: true })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
